kind = "web"
previewPath = "/"
title = "MaintainHome.ai"
version = "1.0.0"
id = "artifacts/maintain-home"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19957
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/maintain-home run dev"

[services.env]
PORT = "19957"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/maintain-home", "run", "build"]

[services.production.run]
args = ["node", "artifacts/maintain-home/server.mjs"]

[services.production.run.env]
PORT = "19957"
API_BASE_URL = "http://127.0.0.1:8080"
