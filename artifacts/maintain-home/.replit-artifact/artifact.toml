kind = "web"
previewPath = "/"
title = "MaintainHome.ai"
version = "1.0.0"
id = "artifacts/maintain-home"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19957
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/maintain-home run dev"

[services.env]
PORT = "19957"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/maintain-home", "run", "build"]
publicDir = "artifacts/maintain-home/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
